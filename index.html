<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wincash</title>
    <style>
        /* Pure Mobile App Environment Layout */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        body, html { 
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%); /* Zupee Deep Royal Base */
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }
        /* Full Screen Component Container */
        #game-arena {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>

    <!-- Dynamic Screen Mount (Pure page par full layout load hoga) -->
    <div id="game-arena">
        <div style="color: #facc15; padding-top: 50vh; text-align:center; font-weight:bold;">INITIALIZING APP...</div>
    </div>

    <!-- Navigation Bar Fixed Container at Bottom -->
    <div id="app-nav"></div>

    <!-- Core Module Router -->
    <script type="module" src="app.js"></script>
</body>
</html>
